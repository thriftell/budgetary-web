name: CI

on:
  pull_request:
  push:
    branches-ignore: [main] # main is covered by the deploy workflow

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Honesty gate runs as prebuild (src) + postbuild (dist) inside `build`.
      - run: npm run build
