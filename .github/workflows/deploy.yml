name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # `prebuild` runs the forbidden-phrase gate over src/; `postbuild` runs it
      # over the rendered dist/. A hit fails the build (Invariants 1 & 2).
      #
      # ┌─ DISCLOSURE GATE (0020b) — COUNSEL-GATED PUBLISH ──────────────────────┐
      # │ SHOW_DETAILS is committed as "false", so the /how-it-works depth is    │
      # │ NOT emitted, indexed, or linked in production.                         │
      # │                                                                        │
      # │ Setting SHOW_DETAILS to "true" below IS the irreversible, pre-filing-  │
      # │ sensitive publish action. It must happen ONLY via a reviewed PR after  │
      # │ counsel sign-off — deliberately NOT a repo/environment variable that a │
      # │ single toggle could flip without code review. (Then see GATING.md      │
      # │ step 2 to also allow indexing.) Recommended belt-and-suspenders:       │
      # │ protect the `github-pages` environment with required reviewers.        │
      # └────────────────────────────────────────────────────────────────────────┘
      - run: npm run build
        env:
          SHOW_DETAILS: "false"
          # Public Turnstile site key for the signup widget (0021b). Public value,
          # injected at build time; the matching secret lives server-side (0021a).
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
